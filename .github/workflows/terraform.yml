name: Terraform
on:
  push:
    branches: [ main ]
    paths: [ 'terraform/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'terraform/**' ]

permissions: {}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
          TF_VAR_oci_compartment_ocid: ${{ secrets.TF_VAR_OCI_COMPARTMENT_OCID }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
          TF_VAR_cognito_user_pool_id: ${{ secrets.TF_VAR_COGNITO_USER_POOL_ID }}
          TF_VAR_function_image: ${{ secrets.TF_VAR_FUNCTION_IMAGE }}
          TF_VAR_worker_api_key: ${{ secrets.TF_VAR_WORKER_API_KEY }}
          TF_VAR_job_store_url: ${{ secrets.TF_VAR_JOB_STORE_URL }}
          TF_VAR_job_store_api_key: ${{ secrets.TF_VAR_JOB_STORE_API_KEY }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        env:
          TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
          TF_VAR_oci_compartment_ocid: ${{ secrets.TF_VAR_OCI_COMPARTMENT_OCID }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
          TF_VAR_cognito_user_pool_id: ${{ secrets.TF_VAR_COGNITO_USER_POOL_ID }}
          TF_VAR_function_image: ${{ secrets.TF_VAR_FUNCTION_IMAGE }}
          TF_VAR_worker_api_key: ${{ secrets.TF_VAR_WORKER_API_KEY }}
          TF_VAR_job_store_url: ${{ secrets.TF_VAR_JOB_STORE_URL }}
          TF_VAR_job_store_api_key: ${{ secrets.TF_VAR_JOB_STORE_API_KEY }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        env:
          TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
          TF_VAR_oci_compartment_ocid: ${{ secrets.TF_VAR_OCI_COMPARTMENT_OCID }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
          TF_VAR_cognito_user_pool_id: ${{ secrets.TF_VAR_COGNITO_USER_POOL_ID }}
          TF_VAR_function_image: ${{ secrets.TF_VAR_FUNCTION_IMAGE }}
          TF_VAR_worker_api_key: ${{ secrets.TF_VAR_WORKER_API_KEY }}
          TF_VAR_job_store_url: ${{ secrets.TF_VAR_JOB_STORE_URL }}
          TF_VAR_job_store_api_key: ${{ secrets.TF_VAR_JOB_STORE_API_KEY }}
