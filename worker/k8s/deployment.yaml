apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-reading-worker
  namespace: private-reading
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: private-reading-worker
  template:
    metadata:
      labels:
        app: private-reading-worker
    spec:
      hostNetwork: true   # required: worker reaches LAN TTS server by host IP
      dnsPolicy: Default
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ocir-pull-secret
      containers:
      - name: worker
        image: ord.ocir.io/axwer8ojpvgx/private-reading/worker:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pgrep", "-f", "worker.py"]
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["pgrep", "-f", "worker.py"]
          initialDelaySeconds: 15
          periodSeconds: 15
        envFrom:
        - configMapRef:
            name: private-reading-worker-config
        - secretRef:
            name: private-reading-worker-secrets
        volumeMounts:
        - name: oci-config
          mountPath: /home/worker/.oci
          readOnly: true

      volumes:
      - name: oci-config
        secret:
          secretName: private-reading-oci-config
          items:
          - key: config
            path: config
          - key: key.pem
            path: key.pem
