apiVersion: v1
kind: ConfigMap
metadata:
  name: private-reading-worker-config
  namespace: private-reading
data:
  API_BASE_URL: "<YOUR_OCI_API_GATEWAY_URL>/v1"
  AUDIOBOOKS_BUCKET: "<YOUR_OCI_BUCKET_NAME>"
  OCI_NAMESPACE: "<YOUR_OCI_NAMESPACE>"
  OCI_REGION: "<YOUR_OCI_REGION>"
  TTS_ENDPOINT: "http://<YOUR_TTS_HOST>:8014/v1/audio/speech"
  TTS_PROVIDER: "qwen"
  TTS_MODEL: "qwen3-tts-base"
  TTS_REFERENCE_ID: "m-relaxed"
  TTS_TIMEOUT_SECONDS: "450"
  TTS_RETRY_ATTEMPTS: "2"
  SEMAPHORE_SIZE: "1"
  PROCESSING_CHUNK_SIZE: "400"
