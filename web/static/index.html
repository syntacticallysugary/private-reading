<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Reading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --card:      #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --primary:   #3b82f6;
      --primary-h: #60a5fa;
      --danger:    #f87171;
      --success:   #4ade80;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    header p {
      color: var(--muted);
      margin-top: .35rem;
      font-size: .95rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 720px;
      padding: 2rem;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: .875rem;
      margin-bottom: .5rem;
      color: var(--text);
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: .875rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .95rem;
      line-height: 1.6;
      color: var(--text);
      background: #0f172a;
      resize: vertical;
      transition: border-color .15s;
      outline: none;
    }
    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: var(--muted); }

    .char-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: .4rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .char-row.warn { color: #fbbf24; }
    .char-row.over { color: var(--danger); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .7rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      width: 100%;
      margin-top: 1.1rem;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--primary-h);
      border: 1px solid var(--border);
      padding: .5rem 1.1rem;
      font-size: .875rem;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-secondary:hover { background: #0f172a; }

    /* ── Status section ── */
    #status-section { display: none; margin-top: 1.5rem; }

    .status-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-weight: 600;
      font-size: .95rem;
      margin-bottom: 1rem;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }
    .chunk-label {
      margin-top: .5rem;
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── Audio section ── */
    #audio-section { display: none; margin-top: 1.5rem; }

    .done-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 1rem;
    }
    .done-icon { font-size: 1.2rem; }

    audio {
      width: 100%;
      border-radius: var(--radius);
    }

    .audio-actions {
      display: flex;
      gap: .75rem;
      margin-top: .85rem;
      flex-wrap: wrap;
    }

    /* ── Error section ── */
    #error-section { display: none; margin-top: 1.5rem; }

    .error-box {
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      color: var(--danger);
      font-size: .9rem;
      line-height: 1.5;
      margin-bottom: .75rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Private Reading</h1>
  <p>Paste text and convert it to audio using your local TTS server.</p>
</header>

<div class="card">

  <!-- Input -->
  <div id="input-section">
    <label for="text-input">Text to read</label>
    <textarea id="text-input"
              placeholder="Paste your article, essay, or document here…"
              oninput="onTextInput()"></textarea>
    <div class="char-row" id="char-row">
      <span id="char-count">0 characters</span>
      <span>100,000 max</span>
    </div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitText()">
      Convert to Audio
    </button>
  </div>

  <!-- Processing status -->
  <div id="status-section">
    <div class="status-header">
      <div class="spinner" id="status-spinner"></div>
      <span id="status-text">Queued…</span>
    </div>
    <div id="progress-wrap" style="display:none">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="chunk-label" id="chunk-label"></div>
    </div>
  </div>

  <!-- Audio player (shown on completion) -->
  <div id="audio-section">
    <div class="done-header">
      <span class="done-icon">✓</span>
      <span>Ready</span>
    </div>
    <audio id="audio-player" controls></audio>
    <div class="audio-actions">
      <a id="download-link" class="btn btn-secondary" download>Download WAV</a>
      <button class="btn btn-secondary" onclick="resetUI()">New conversion</button>
    </div>
  </div>

  <!-- Error -->
  <div id="error-section">
    <div class="error-box" id="error-text"></div>
    <button class="btn btn-secondary" onclick="resetUI()">Try again</button>
  </div>

</div>

<script>
  const MAX_CHARS = 100_000;
  let _jobId = null;
  let _pollTimer = null;

  // ── Character counter ──────────────────────────────────────────────────────

  function onTextInput() {
    const n = document.getElementById('text-input').value.length;
    const row = document.getElementById('char-row');
    const el  = document.getElementById('char-count');
    el.textContent = n.toLocaleString() + ' characters';
    row.className = 'char-row' + (n > MAX_CHARS ? ' over' : n > MAX_CHARS * 0.85 ? ' warn' : '');
    document.getElementById('submit-btn').disabled = n === 0 || n > MAX_CHARS;
  }

  // ── Submit ─────────────────────────────────────────────────────────────────

  async function submitText() {
    const text = document.getElementById('text-input').value;
    if (!text.trim()) return;

    setSubmitting(true);
    hide('audio-section');
    hide('error-section');

    try {
      const resp = await fetch('/api/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showError(err.detail || `Server error (${resp.status})`);
        setSubmitting(false);
        return;
      }

      const { job_id } = await resp.json();
      _jobId = job_id;
      showStatus('Queued…');
      startPolling(job_id);
    } catch (e) {
      showError('Network error — is the server running? ' + e.message);
      setSubmitting(false);
    }
  }

  // ── Polling ────────────────────────────────────────────────────────────────

  function startPolling(jobId) {
    _pollTimer = setInterval(() => poll(jobId), 2000);
  }

  async function poll(jobId) {
    try {
      const resp = await fetch(`/api/jobs/${jobId}`);
      if (!resp.ok) return;
      const job = await resp.json();
      handleJobUpdate(job);
    } catch (_) { /* network blip — keep polling */ }
  }

  function handleJobUpdate(job) {
    if (job.status === 'pending') {
      showStatus('Queued…');

    } else if (job.status === 'processing') {
      const done  = job.chunks_done  ?? 0;
      const total = job.chunks_total ?? null;
      showStatus(`Converting chunks${total ? ` (${done} / ${total})` : '…'}`);
      if (total) {
        show('progress-wrap');
        setProgress(done / total);
        document.getElementById('chunk-label').textContent =
          `${done} of ${total} chunk${total === 1 ? '' : 's'} complete`;
      }

    } else if (job.status === 'done') {
      clearInterval(_pollTimer);
      showAudio(job.job_id);

    } else if (job.status === 'failed') {
      clearInterval(_pollTimer);
      hide('status-section');
      showError(job.error || 'Processing failed. Check server logs.');
      setSubmitting(false);
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────

  function setSubmitting(yes) {
    document.getElementById('submit-btn').disabled = yes;
    show('input-section');
  }

  function showStatus(msg) {
    hide('audio-section');
    hide('error-section');
    show('status-section');
    document.getElementById('status-text').textContent = msg;
  }

  function setProgress(ratio) {
    document.getElementById('progress-fill').style.width = (ratio * 100).toFixed(1) + '%';
  }

  function showAudio(jobId) {
    hide('status-section');
    hide('error-section');

    const url = `/api/jobs/${jobId}/audio`;
    document.getElementById('audio-player').src = url;
    document.getElementById('download-link').href = url;
    document.getElementById('download-link').download =
      `private-reading-${jobId.slice(0, 8)}.wav`;

    show('audio-section');
  }

  function showError(msg) {
    hide('status-section');
    document.getElementById('error-text').textContent = msg;
    show('error-section');
  }

  function resetUI() {
    clearInterval(_pollTimer);
    _jobId = null;
    hide('status-section');
    hide('audio-section');
    hide('error-section');
    hide('progress-wrap');
    setProgress(0);
    document.getElementById('text-input').value = '';
    document.getElementById('char-count').textContent = '0 characters';
    document.getElementById('char-row').className = 'char-row';
    document.getElementById('submit-btn').disabled = false;
  }

  function show(id) { document.getElementById(id).style.display = ''; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
