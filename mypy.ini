[mypy]
python_version = 3.12
ignore_missing_imports = True
no_strict_optional = True
warn_unused_ignores = False
exclude = tests/|tools/|core/

# Runtime deps not installed in the dev environment
[mypy-oci]
ignore_missing_imports = True
ignore_errors = True

[mypy-oci.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-borneo]
ignore_missing_imports = True
ignore_errors = True

[mypy-borneo.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-fdk]
ignore_missing_imports = True
ignore_errors = True

[mypy-fdk.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-inotify_simple]
ignore_missing_imports = True
ignore_errors = True

[mypy-semchunk]
ignore_missing_imports = True
ignore_errors = True

[mypy-pdfplumber]
ignore_missing_imports = True
ignore_errors = True

[mypy-pdfplumber.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-structlog]
ignore_missing_imports = True
ignore_errors = True

[mypy-structlog.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-jsonlogger]
ignore_missing_imports = True
ignore_errors = True

# Utility modules with complex third-party handler initialization
[mypy-private_reading.utils.logging_config]
ignore_errors = True

[mypy-private_reading.utils.logging]
ignore_errors = True

# Legacy pipeline module — complex typing deferred
[mypy-private_reading.core.pipeline]
ignore_errors = True
