<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Reading</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Private Reading</h1>
</header>

<div class="main-wrap">
  <div class="card">

    <!-- Login Section -->
    <div id="login-section">
      <h2 class="card-title">Welcome back</h2>
      <p class="card-subtitle">Sign in to access your private audiobooks.</p>

      <div id="login-error" class="error-box" style="display:none;"></div>

      <div class="field">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="login()">Sign In</button>
    </div>

    <!-- App Section (Authenticated) -->
    <div id="app-section" style="display: none;">
      <div id="user-info">
        <span id="username-display"></span>
        <button class="btn-text" onclick="logout()">Logout</button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-convert-btn" onclick="showTab('convert')">Convert</button>
      </div>

      <!-- Convert tab -->
      <div id="tab-convert">
        <div id="input-section">
          <label for="text-input">Text to read</label>
          <textarea id="text-input"
                    placeholder="Paste your text here…"
                    oninput="onTextInput()"></textarea>
          <div class="char-row" id="char-row">
            <span id="char-count">0 characters</span>
            <span>100,000 max</span>
          </div>
          <button class="btn btn-primary" id="submit-btn" onclick="submitText()" disabled>
            Convert to Audio
          </button>
        </div>

        <!-- Processing status -->
        <div id="status-section" style="display: none;">
          <div class="status-header">
            <div class="spinner"></div>
            <span id="status-text">Queued…</span>
          </div>
          <div id="progress-bar-wrap" style="display: none; margin-bottom: 0.75rem;">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-label" id="progress-label"></p>
          </div>
          <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem;">
            Job ID: <span id="active-job-id"></span>
          </p>
        </div>

        <!-- Audio result -->
        <div id="audio-section" style="display: none;">
          <div class="done-header">
            <span class="done-icon">✓</span>
            <span>Ready</span>
          </div>
          <div class="audio-actions">
            <button id="download-btn" class="btn btn-primary" onclick="downloadAudio()">Download Opus (.ogg)</button>
            <button class="btn btn-secondary" onclick="resetUI()">New conversion</button>
          </div>
        </div>

        <!-- Error -->
        <div id="error-section" style="display: none;">
          <div class="error-box" id="error-text"></div>
          <button class="btn btn-secondary" onclick="resetUI()">Try again</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="app.js?v=14"></script>
</body>
</html>
