name: Deploy SPA
on:
  push:
    branches: [ main ]
    paths:
      - 'spa/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ARM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 64.181.220.163 >> ~/.ssh/known_hosts

      - name: Deploy SPA
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            spa/ ubuntu@64.181.220.163:/var/www/reading.syntacticallysugary.dev/

      - name: Verify
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 \
            "ls /var/www/reading.syntacticallysugary.dev/"
