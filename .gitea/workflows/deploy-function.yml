name: Deploy Function
on:
  push:
    paths:
      - 'fn/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Docker Login to OCIR
        run: |
          echo "${{ secrets.OCIR_TOKEN }}" | docker login ord.ocir.io -u "axwer8ojpvgx/${{ secrets.OCI_USER_NAME }}" --password-stdin

      - name: Build and Push Image
        run: |
          docker build -t ord.ocir.io/axwer8ojpvgx/private-reading/api:${{ github.sha }} -f fn/Dockerfile fn/
          docker tag ord.ocir.io/axwer8ojpvgx/private-reading/api:${{ github.sha }} ord.ocir.io/axwer8ojpvgx/private-reading/api:latest
          docker push ord.ocir.io/axwer8ojpvgx/private-reading/api:${{ github.sha }}
          docker push ord.ocir.io/axwer8ojpvgx/private-reading/api:latest

      - name: Install OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/config ~/.oci/key.pem

      - name: Update OCI Function Image
        run: |
          oci fn function update \
            --function-id ${{ secrets.FUNCTION_OCID }} \
            --image ord.ocir.io/axwer8ojpvgx/private-reading/api:${{ github.sha }}
