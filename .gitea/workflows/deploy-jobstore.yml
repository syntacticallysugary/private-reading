name: Deploy Job Store
on:
  push:
    branches: [ main ]
    paths:
      - 'jobstore/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ARM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 64.181.220.163 >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 \
            "sudo mkdir -p /opt/jobstore /data && sudo chown ubuntu:ubuntu /opt/jobstore /data"

      - name: Sync application files
        run: |
          rsync -az --delete \
            --exclude=venv \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            jobstore/ ubuntu@64.181.220.163:/opt/jobstore/

      - name: Write env file
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 \
            "printf 'JOB_STORE_TOKEN=%s\n' '${{ secrets.JOB_STORE_API_KEY }}' > /opt/jobstore/.env && chmod 600 /opt/jobstore/.env"

      - name: Set up venv and install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 "
            set -e
            sudo apt-get install -y python3-venv -qq 2>/dev/null
            if [ ! -f /opt/jobstore/venv/bin/pip ]; then
              rm -rf /opt/jobstore/venv
              python3 -m venv /opt/jobstore/venv
            fi
            /opt/jobstore/venv/bin/pip install -q -r /opt/jobstore/requirements.txt
          "

      - name: Install and restart systemd service
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 "
            set -e
            sudo cp /opt/jobstore/jobstore.service /etc/systemd/system/jobstore.service
            sudo systemctl daemon-reload
            sudo systemctl enable jobstore
            sudo systemctl restart jobstore
          "

      - name: Verify service is running
        run: |
          sleep 3
          ssh -i ~/.ssh/deploy_key ubuntu@64.181.220.163 "systemctl is-active jobstore"
